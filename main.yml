name: Build and Deploy to Azure Container Instances

on:
  push:
    branches:
      - main

env:
  ACR_LOGIN_SERVER: tedsproject.azurecr.io
  IMAGE_NAME: tedsproject.azurecr.io/finalproject
  RESOURCE_GROUP: TEDS
  CONTAINER_NAME: FinalProject
  LOCATION: chilecentral

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.IMAGE_NAME }}:latest

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          dns-name-label: finalproject-${{ github.run_id }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          registry-login-server: ${{ env.ACR_LOGIN_SERVER }}
          registry-username: ${{ secrets.ACR_USERNAME }}
          registry-password: ${{ secrets.ACR_PASSWORD }}
          name: ${{ env.CONTAINER_NAME }}
          location: ${{ env.LOCATION }}
          ports: 8888
          environment-variables: GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/service-account.json
